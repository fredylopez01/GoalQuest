---
# ─────────────────────────────────────────────────────────────
# Redis sin mTLS
# ─────────────────────────────────────────────────────────────

apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: redis-disable-mtls
  namespace: goalquest

spec:
  selector:
    matchLabels:
      app: redis

  mtls:
    mode: DISABLE
