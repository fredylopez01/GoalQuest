# ═══════════════════════════════════════════════════════
# OBSERVABILIDAD ISTIO
# Telemetry API: métricas, trazas distribuidas y acceso logs
# ═══════════════════════════════════════════════════════

# ── Telemetry global: habilitar métricas Prometheus ──────────────────
apiVersion: telemetry.istio.io/v1alpha1
kind: Telemetry
metadata:
  name: goalquest-metrics
  namespace: goalquest
spec:
  metrics:
    - providers:
        - name: prometheus
      # Reportar todas las métricas estándar de Istio
      reportingInterval: 15s
      overrides:
        # Añadir labels personalizados para GoalQuest
        - match:
            metric: ALL_METRICS
          tagOverrides:
            goalquest_service:
              value: "source.labels['app']"
            goalquest_version:
              value: "source.labels['version']"

---
# ── Telemetry: Trazas distribuidas con Jaeger ────────────────────────
apiVersion: telemetry.istio.io/v1alpha1
kind: Telemetry
metadata:
  name: goalquest-tracing
  namespace: goalquest
spec:
  tracing:
    - providers:
        - name: jaeger
      # Samplear el 100% del tráfico en desarrollo (bajar a 1-10% en producción)
      randomSamplingPercentage: 100.0
      customTags:
        environment:
          literal:
            value: "development"
        service_team:
          literal:
            value: "goalquest-uptc"

---
# ── Telemetry: Logs de acceso ────────────────────────────────────────
apiVersion: telemetry.istio.io/v1alpha1
kind: Telemetry
metadata:
  name: goalquest-access-logs
  namespace: goalquest
spec:
  accessLogging:
    - providers:
        - name: envoy
      filter:
        # Loguear todo (en producción filtra por código de error >= 400)
        expression: "true"

---
# ── Kiali: herramienta de visualización del service mesh ─────────────
# Se instala con: kubectl apply -f https://raw.githubusercontent.com/istio/istio/release-1.21/samples/addons/kiali.yaml
# Aquí solo configuramos el acceso
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: kiali-vs
  namespace: istio-system
spec:
  hosts:
    - "kiali.goalquest.local"
  gateways:
    - istio-system/goalquest-gateway-system
  http:
    - route:
        - destination:
            host: kiali
            port:
              number: 20001

---
# Gateway para herramientas de observabilidad (en istio-system)
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: goalquest-gateway-system
  namespace: istio-system
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "kiali.goalquest.local"
        - "grafana.goalquest.local"
        - "jaeger.goalquest.local"
        - "prometheus.goalquest.local"

---
# ── Grafana VirtualService ───────────────────────────────────────────
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: grafana-vs
  namespace: istio-system
spec:
  hosts:
    - "grafana.goalquest.local"
  gateways:
    - istio-system/goalquest-gateway-system
  http:
    - route:
        - destination:
            host: grafana
            port:
              number: 3000

---
# ── Jaeger VirtualService ────────────────────────────────────────────
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: jaeger-vs
  namespace: istio-system
spec:
  hosts:
    - "jaeger.goalquest.local"
  gateways:
    - istio-system/goalquest-gateway-system
  http:
    - route:
        - destination:
            host: tracing
            port:
              number: 80

---
# ── Prometheus VirtualService ────────────────────────────────────────
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: prometheus-vs
  namespace: istio-system
spec:
  hosts:
    - "prometheus.goalquest.local"
  gateways:
    - istio-system/goalquest-gateway-system
  http:
    - route:
        - destination:
            host: prometheus
            port:
              number: 9090
