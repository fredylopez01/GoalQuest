# ═══════════════════════════════════════════════════════
# GESTIÓN DE TRÁFICO AVANZADA
# - Retry policies por ruta
# - Timeouts específicos por operación
# - Circuit Breaker con outlierDetection
# - Fault injection para pruebas (comentado por defecto)
# ═══════════════════════════════════════════════════════

# ── EnvoyFilter: Headers de correlación de trazas ────────────────────
# Propaga automáticamente los headers B3/W3C entre servicios
# para que Jaeger pueda reconstruir el trace completo
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: goalquest-trace-headers
  namespace: goalquest
spec:
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        context: ANY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.lua
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.LuaPerRoute
            inline_code: |
              function envoy_on_request(request_handle)
                -- Propagar headers de tracing si vienen del cliente
                local trace_headers = {
                  "x-request-id",
                  "x-b3-traceid",
                  "x-b3-spanid",
                  "x-b3-parentspanid",
                  "x-b3-sampled",
                  "x-b3-flags",
                  "x-ot-span-context",
                  "traceparent",
                  "tracestate"
                }
                for _, header in ipairs(trace_headers) do
                  local val = request_handle:headers():get(header)
                  if val then
                    request_handle:headers():add(header, val)
                  end
                end
              end

