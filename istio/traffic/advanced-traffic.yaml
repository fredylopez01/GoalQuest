---
# ── ServiceEntry: Permitir tráfico egress a servicios externos ─────────
# Por defecto Istio en modo REGISTRY_ONLY bloquea todo egress no declarado.
# Estos ServiceEntry permiten que los microservicios llamen a Eureka
# y entre sí de forma controlada.
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: eureka-external
  namespace: goalquest
spec:
  hosts:
    - eureka-server.goalquest.svc.cluster.local
  ports:
    - number: 8761
      name: http
      protocol: HTTP
  location: MESH_INTERNAL
  resolution: DNS

---
# ── PodDisruptionBudget: garantizar disponibilidad mínima ─────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: identity-service-pdb
  namespace: goalquest
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: identity-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: task-service-pdb
  namespace: goalquest
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: task-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gamification-service-pdb
  namespace: goalquest
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: gamification-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: challenge-service-pdb
  namespace: goalquest
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: challenge-service

---
# ── HorizontalPodAutoscaler: escalar según tráfico ───────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: identity-service-hpa
  namespace: goalquest
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: identity-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: task-service-hpa
  namespace: goalquest
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: task-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
