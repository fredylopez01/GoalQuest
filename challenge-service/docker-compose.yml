services:
  mongodb-challenges:
    image: mongo:7.0
    container_name: mongodb-challenges
    ports:
      - '27018:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: challenge_db
    volumes:
      - mongodb_challenges_data:/data/db
      - ./mongo-init/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - challenge-network

  mongo-express:
    image: mongo-express:1.0.2
    container_name: mongo-express-challenges
    ports:
      - '8082:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb-challenges:27017/
      ME_CONFIG_BASICAUTH: 'false'
    depends_on:
      - mongodb-challenges
    networks:
      - challenge-network

volumes:
  mongodb_challenges_data:

networks:
  challenge-network:
    driver: bridge
