# ═══════════════════════════════════════════════════════════════
# FIX: Istio bloqueaba el tráfico a Eureka con mTLS STRICT
# Los servicios Node.js/Python no soportan mTLS automáticamente
# sin el sidecar configurado correctamente desde el inicio.
# PERMISSIVE acepta tanto tráfico mTLS como plain HTTP.
# ═══════════════════════════════════════════════════════════════
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: goalquest-permissive
  namespace: goalquest
spec:
  mtls:
    mode: PERMISSIVE
---
# ═══════════════════════════════════════════════════════════════
# DestinationRule: permite que los sidecars envíen tráfico
# sin forzar mTLS hacia servicios que aún no lo soportan
# ═══════════════════════════════════════════════════════════════
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: goalquest-dr-mtls
  namespace: goalquest
spec:
  host: "*.goalquest.svc.cluster.local"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
