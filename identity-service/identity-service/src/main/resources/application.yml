server:
  port: 8081

spring:
  application:
    name: identity-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:goalquest_identity}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── OAuth2 / Google ──────────────────────────────────────────────────────
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: false
    hostname: ${EUREKA_INSTANCE_HOST:localhost}

jwt:
  secret: ${JWT_SECRET:goalquest-super-secret-key-change-in-production-must-be-at-least-256-bits}
  expiration: ${JWT_EXPIRATION:86400}

internal:
  service-key: ${INTERNAL_SERVICE_KEY:goalquest-internal-secret}

admin:
  email: ${ADMIN_EMAIL:admin@goalquest.com}
  password: ${ADMIN_PASSWORD:Admin1234!}
  name: ${ADMIN_NAME:Admin GoalQuest}

# ── Frontend URL (para redirects OAuth2) ─────────────────────────────────
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.goalquest: DEBUG
    org.springframework.security: WARN

# ── Swagger / SpringDoc ──────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /docs
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
    default-models-expand-depth: 3
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
