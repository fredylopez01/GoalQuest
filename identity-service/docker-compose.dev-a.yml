version: '3.8'

services:

  identity-db:
    image: postgres:16-alpine
    container_name: goalquest-identity-db
    environment:
      POSTGRES_DB: ${IDENTITY_DB_NAME}
      POSTGRES_USER: ${IDENTITY_DB_USER}
      POSTGRES_PASSWORD: ${IDENTITY_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - identity-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${IDENTITY_DB_USER} -d ${IDENTITY_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - goalquest-network

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: goalquest-eureka
    ports:
      - "8761:8761"
    networks:
      - goalquest-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s

  identity-service:
    build:
      context: ./identity-service
      dockerfile: Dockerfile
    container_name: goalquest-identity
    environment:
      DB_HOST: identity-db
      DB_PORT: 5432
      DB_NAME: ${IDENTITY_DB_NAME}
      DB_USER: ${IDENTITY_DB_USER}
      DB_PASSWORD: ${IDENTITY_DB_PASSWORD}
      EUREKA_HOST: eureka-server
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME}
    ports:
      - "8081:8081"
    depends_on:
      identity-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    restart: on-failure
    networks:
      - goalquest-network

volumes:
  identity-db-data:

networks:
  goalquest-network:
    name: goalquest-network
    driver: bridge
