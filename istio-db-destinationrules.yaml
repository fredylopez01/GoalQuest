# ═══════════════════════════════════════════════════════════════
# istio-db-destinationrules.yaml
#
# PROBLEMA RAÍZ:
# Excluir puertos outbound (5432, 27017, 6379) con
# excludeOutboundPorts hace que el tráfico entre microservicios
# también evite el proxy Envoy → sin métricas, sin Kiali.
#
# SOLUCIÓN CORRECTA:
# Dejar que TODO el tráfico pase por Envoy, pero decirle a Istio
# que use TLS mode DISABLE solo hacia las bases de datos.
# Así el service mesh funciona para tráfico entre servicios,
# y las bases de datos reciben conexiones plain TCP normales.
# ═══════════════════════════════════════════════════════════════

# ── PostgreSQL: identity-db ──────────────────────────────────────
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: identity-db-dr
  namespace: goalquest
spec:
  host: identity-db.goalquest.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE

---
# ── PostgreSQL: tasks-db ─────────────────────────────────────────
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: tasks-db-dr
  namespace: goalquest
spec:
  host: tasks-db.goalquest.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE

---
# ── MongoDB: mongodb-gamification ────────────────────────────────
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: mongodb-gamification-dr
  namespace: goalquest
spec:
  host: mongodb-gamification.goalquest.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE

---
# ── MongoDB: mongodb-challenges ──────────────────────────────────
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: mongodb-challenges-dr
  namespace: goalquest
spec:
  host: mongodb-challenges.goalquest.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE

---
# ── Redis ────────────────────────────────────────────────────────
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: redis-dr
  namespace: goalquest
spec:
  host: redis.goalquest.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE

---
# ── Eureka: ISTIO_MUTUAL para que las métricas funcionen ─────────
# Eureka tiene excludeInboundPorts: "8761" en el pod, así que
# acepta conexiones plain. Desde el cliente usamos DISABLE también.
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: eureka-server-dr
  namespace: goalquest
spec:
  host: eureka-server.goalquest.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE

---
# ── Microservicios entre sí: ISTIO_MUTUAL ────────────────────────
# El tráfico entre identity, task, gamification y challenge
# SÍ debe pasar por mTLS para que Kiali vea el grafo.
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: identity-service-dr
  namespace: goalquest
spec:
  host: identity-service.goalquest.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: task-service-dr
  namespace: goalquest
spec:
  host: task-service.goalquest.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: gamification-service-dr
  namespace: goalquest
spec:
  host: gamification-service.goalquest.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: challenge-service-dr
  namespace: goalquest
spec:
  host: challenge-service.goalquest.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
