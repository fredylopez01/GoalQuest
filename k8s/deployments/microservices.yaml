                  key: XP_REWARD_WINNER
            - name: XP_REWARD_LOSER
              valueFrom:
                secretKeyRef:
                  name: goalquest-secrets
                  key: XP_REWARD_LOSER
            - name: XP_REWARD_DRAW
              valueFrom:
                secretKeyRef:
                  name: goalquest-secrets
                  key: XP_REWARD_DRAW
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 40
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "150m"
            limits:
              memory: "512Mi"
              cpu: "500m"
