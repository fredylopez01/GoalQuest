apiVersion: v1
kind: Service
metadata:
  name: challenge-service
  namespace: goalquest
  labels:
    app: challenge-service
spec:
  selector:
    app: challenge-service
  ports:
    - port: 3002
      targetPort: 3002
      name: http
      nodePort: 30002
  type: NodePort
