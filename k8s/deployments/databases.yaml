# ═══════════════════════════════════════════════════════
# INFRAESTRUCTURA: Bases de datos y caches
# Namespace: goalquest (mismo para simplicidad con Istio)
# ═══════════════════════════════════════════════════════

# ── PostgreSQL Identity ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-db
  namespace: goalquest
  labels:
    app: identity-db
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-db
  template:
    metadata:
      labels:
        app: identity-db
        tier: database
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: goalquest-secrets
                  key: IDENTITY_DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: goalquest-secrets
                  key: IDENTITY_DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: goalquest-secrets
                  key: IDENTITY_DB_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                ["pg_isready", "-U", "postgres", "-d", "goalquest_identity"]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: identity-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: identity-db
  namespace: goalquest
  labels:
    app: identity-db
spec:
  selector:
    app: identity-db
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: identity-db-pvc
  namespace: goalquest
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

