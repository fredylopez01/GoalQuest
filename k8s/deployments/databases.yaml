# ── MongoDB Challenges ───────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-challenges
  namespace: goalquest
  labels:
    app: mongodb-challenges
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb-challenges
  template:
    metadata:
      labels:
        app: mongodb-challenges
        tier: database
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: mongo
          image: mongo:7.0
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: goalquest-secrets
                  key: CHALLENGE_MONGO_ROOT_USER
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: goalquest-secrets
                  key: CHALLENGE_MONGO_ROOT_PASSWORD
            - name: MONGO_INITDB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: goalquest-secrets
                  key: CHALLENGE_MONGO_DB
          volumeMounts:
            - name: data
              mountPath: /data/db
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
          startupProbe:
            exec:
              command:
                - mongosh
                - --eval
                - db.adminCommand('ping')

            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mongodb-challenges-pvc
        - name: init-script
          configMap:
            name: mongodb-challenges-init
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-challenges
  namespace: goalquest
  labels:
    app: mongodb-challenges
spec:
  selector:
    app: mongodb-challenges
  ports:
    - port: 27017
      targetPort: 27017
      name: mongo
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-challenges-pvc
  namespace: goalquest
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

