# IMPORTANTE: En producción usa Sealed Secrets o Vault.
# Los valores aquí son base64 de los valores del .env.example
# Para codificar: echo -n "valor" | base64

apiVersion: v1
kind: Secret
metadata:
  name: goalquest-secrets
  namespace: goalquest
type: Opaque
stringData:
  # Identity DB
  IDENTITY_DB_NAME: "goalquest_identity"
  IDENTITY_DB_USER: "postgres"
  IDENTITY_DB_PASSWORD: "postgres_secret"
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

  # Tasks DB
  TASKS_DB_NAME: "tasks_db"
  TASKS_DB_USER: "tasks_user"
  TASKS_DB_PASSWORD: "tasks123"

  # Challenge MongoDB
  CHALLENGE_MONGO_ROOT_USER: "admin"
  CHALLENGE_MONGO_ROOT_PASSWORD: "admin123"
  CHALLENGE_MONGO_DB: "challenge_db"
  CHALLENGE_MONGO_USER: "challenge_user"
  CHALLENGE_MONGO_PASSWORD: "challenge_pass"

  # Gamification MongoDB
  GAMIFICATION_MONGO_DB: "gamification_db"

  # JWT
  JWT_SECRET: "goalquest-super-secret-key-change-in-production-min-32chars!!"
  JWT_EXPIRATION: "86400"

  # Internal service key
  INTERNAL_SERVICE_KEY: "goalquest-internal-secret-key-change-in-production"

  # Admin
  ADMIN_EMAIL: "admin@goalquest.com"
  ADMIN_PASSWORD: "admin12345"
  ADMIN_NAME: "Admin GoalQuest"

  # XP Rewards
  XP_REWARD_WINNER: "100"
  XP_REWARD_LOSER: "25"
  XP_REWARD_DRAW: "50"

  # Connection strings (los pods se comunican por nombre de servicio DNS de K8s)
  DATABASE_URL_IDENTITY: "jdbc:postgresql://identity-db:5432/goalquest_identity"
  DATABASE_URL_TASKS: "postgresql://tasks_user:tasks123@tasks-db:5432/tasks_db"
  MONGODB_URI_CHALLENGE: "mongodb://admin:admin123@mongodb-challenges:27017/challenge_db?authSource=admin"
  MONGODB_URL_GAMIFICATION: "mongodb://mongodb-gamification:27017"
  REDIS_URL: "redis://redis:6379"
